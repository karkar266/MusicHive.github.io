<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MusicHive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎵 My Music</h1>

<!-- Поиск -->
<input id="search" placeholder="Поиск музыки">

<button onclick="randomSong()">Случайная песня</button>

  <!-- Результаты поиска -->
<h2>Результаты</h2>
<div id="results"></div>

<!-- Плейлист -->
<h2>Плейлист</h2>
<div id="playlist"></div>

<!-- Плеер -->
<div id="player"></div>

<script src="script.js"></script>
</body>
</html>
